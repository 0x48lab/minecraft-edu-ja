<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Education 日本語ワールド</title>
  <style>
    :root {
      --green-primary: #4CAF50;
      --green-dark: #388E3C;
      --green-light: #C8E6C9;
      --bg: #f5f5f0;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --text-secondary: #666;
      --border: #e0e0e0;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* --- Header --- */
    .header {
      background: linear-gradient(135deg, var(--green-dark), #2E7D32);
      color: white;
      padding: 2rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Crect width='6' height='6' x='0' y='0'/%3E%3Crect width='6' height='6' x='30' y='30'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      position: relative;
    }

    .header p {
      font-size: 0.95rem;
      opacity: 0.9;
      position: relative;
    }

    /* --- Controls --- */
    .controls {
      max-width: 960px;
      margin: -1.5rem auto 0;
      padding: 0 1rem;
      position: relative;
      z-index: 1;
    }

    .search-box {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--green-primary);
    }

    .search-input::placeholder {
      color: #aaa;
    }

    .filter-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.4rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: white;
      color: var(--text-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--green-primary);
      color: var(--green-dark);
    }

    .filter-btn.active {
      background: var(--green-primary);
      border-color: var(--green-primary);
      color: white;
    }

    .result-count {
      font-size: 0.85rem;
      color: var(--text-secondary);
      padding: 0.8rem 0 0;
      max-width: 960px;
      margin: 0 auto;
      padding-left: 1rem;
    }

    /* --- World Cards --- */
    .world-grid {
      max-width: 960px;
      margin: 1rem auto 3rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .world-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .world-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .card-body {
      padding: 1.2rem 1.5rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-title-en {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .card-subject {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: var(--green-light);
      color: var(--green-dark);
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-description {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.8rem;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }

    .tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      background: #f0f0f0;
      color: var(--text-secondary);
      border-radius: 3px;
      font-size: 0.75rem;
    }

    .card-actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      background: var(--green-primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .download-btn:hover {
      background: var(--green-dark);
    }

    .download-btn svg {
      width: 16px;
      height: 16px;
    }

    .source-link {
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .source-link:hover {
      color: var(--green-dark);
      text-decoration: underline;
    }

    /* --- Empty state --- */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    /* --- Report Form --- */
    .report-section {
      max-width: 960px;
      margin: 2rem auto 3rem;
      padding: 0 1rem;
    }

    .report-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .report-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .report-card .report-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .report-card .github-note {
      font-size: 0.82rem;
      color: var(--text-secondary);
      background: #f9f9f5;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    .form-group label .required {
      color: #d32f2f;
      margin-left: 0.2rem;
    }

    .form-group select,
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.6rem 1rem;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group select:focus,
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--green-primary);
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-group .error-msg {
      font-size: 0.82rem;
      color: #d32f2f;
      margin-top: 0.3rem;
      display: none;
    }

    .form-group.has-error select,
    .form-group.has-error input,
    .form-group.has-error textarea {
      border-color: #d32f2f;
    }

    .form-group.has-error .error-msg {
      display: block;
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--green-primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: var(--green-dark);
    }

    .header-report-btn {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.4rem 1rem;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s;
      position: relative;
    }

    .header-report-btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: white;
    }

    /* --- Footer --- */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--green-dark);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* --- Responsive --- */
    @media (min-width: 640px) {
      .header h1 { font-size: 2.2rem; }
    }

    @media (max-width: 480px) {
      .report-card { padding: 1.2rem; }
      .report-card h2 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Minecraft Education 日本語ワールド</h1>
  <p>翻訳済みレッスンワールドのダウンロード</p>
  <a href="#report" class="header-report-btn">問題を報告する</a>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="ワールド名、タグで検索...">
    <div class="filter-group" id="filterGroup"></div>
  </div>
</div>

<div class="result-count" id="resultCount"></div>

<div class="world-grid" id="worldGrid"></div>

<div class="report-section" id="report">
  <div class="report-card">
    <h2>フィードバック・問題報告</h2>
    <p class="report-desc">誤訳、文字化け、ワールド追加リクエスト、その他の要望を報告できます。</p>
    <div class="github-note">
      ※ 報告にはGitHubアカウントが必要です。送信ボタンを押すとGitHubのIssue作成画面に移動します。
    </div>

    <div class="form-group">
      <label for="reportCategory">カテゴリ<span class="required">*</span></label>
      <select id="reportCategory">
        <option value="">選択してください</option>
        <option value="translation-bug">誤訳・文字化け</option>
        <option value="world-request">ワールド追加リクエスト</option>
        <option value="other">その他の要望</option>
      </select>
      <div class="error-msg">カテゴリを選択してください</div>
    </div>

    <div class="form-group" id="worldSelectGroup" style="display:none;">
      <label for="reportWorld">対象ワールド<span class="required">*</span></label>
      <select id="reportWorld">
        <option value="">選択してください</option>
      </select>
      <div class="error-msg">ワールドを選択してください</div>
    </div>

    <div class="form-group" id="worldInputGroup" style="display:none;">
      <label for="reportWorldInput">追加してほしいワールド名<span class="required">*</span></label>
      <input type="text" id="reportWorldInput" placeholder="英語のワールド名を入力">
      <div class="error-msg">ワールド名を入力してください</div>
    </div>

    <div class="form-group" id="descriptionGroup" style="display:none;">
      <label for="reportDescription">説明<span class="required">*</span></label>
      <textarea id="reportDescription" placeholder="問題の詳細や要望を記入してください"></textarea>
      <div class="error-msg">説明を入力してください</div>
    </div>

    <div class="form-group" id="expectedGroup" style="display:none;">
      <label for="reportExpected">期待する修正（任意）</label>
      <input type="text" id="reportExpected" placeholder="正しい翻訳や修正案があれば入力してください">
    </div>

    <button class="submit-btn" id="reportSubmit" style="display:none;" onclick="submitReport()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      GitHubでIssueを作成
    </button>
  </div>
</div>

<div class="footer">
  <p>
    <a href="https://github.com/0x48lab/minecraft-edu-ja">GitHub</a> &middot;
    翻訳コンテンツの著作権は原著作者に帰属します
  </p>
</div>

<script>
const REPO = "0x48lab/minecraft-edu-ja";
let worlds = [];
let activeFilters = new Set();

async function init() {
  const res = await fetch("worlds.json");
  worlds = await res.json();
  buildFilters();
  render();

  document.getElementById("searchInput").addEventListener("input", render);
}

function buildFilters() {
  const subjects = [...new Set(worlds.map(w => w.subject))];
  const group = document.getElementById("filterGroup");

  // "all" button
  const allBtn = document.createElement("button");
  allBtn.className = "filter-btn active";
  allBtn.textContent = "すべて";
  allBtn.dataset.filter = "__all__";
  allBtn.addEventListener("click", () => {
    activeFilters.clear();
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    allBtn.classList.add("active");
    render();
  });
  group.appendChild(allBtn);

  subjects.forEach(subject => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.textContent = subject;
    btn.dataset.filter = subject;
    btn.addEventListener("click", () => {
      const allBtnEl = group.querySelector('[data-filter="__all__"]');
      if (activeFilters.has(subject)) {
        activeFilters.delete(subject);
        btn.classList.remove("active");
      } else {
        activeFilters.add(subject);
        btn.classList.add("active");
      }
      if (activeFilters.size === 0) {
        allBtnEl.classList.add("active");
      } else {
        allBtnEl.classList.remove("active");
      }
      render();
    });
    group.appendChild(btn);
  });
}

function matchesSearch(world, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return (
    world.title.toLowerCase().includes(q) ||
    world.title_en.toLowerCase().includes(q) ||
    world.description.toLowerCase().includes(q) ||
    world.tags.some(t => t.toLowerCase().includes(q)) ||
    world.subject.toLowerCase().includes(q) ||
    (world.original_author && world.original_author.toLowerCase().includes(q))
  );
}

function matchesFilter(world) {
  if (activeFilters.size === 0) return true;
  return activeFilters.has(world.subject);
}

function getDownloadUrl(world) {
  // GitHub Release converts spaces in filenames to dots
  const assetName = world.filename.replace(/ /g, ".");
  return `https://github.com/${REPO}/releases/latest/download/${assetName}`;
}

function render() {
  const query = document.getElementById("searchInput").value.trim();
  const filtered = worlds.filter(w => matchesSearch(w, query) && matchesFilter(w));
  const grid = document.getElementById("worldGrid");
  const countEl = document.getElementById("resultCount");

  countEl.textContent = `${filtered.length} 件のワールド`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#x1F50D;</div>
        <p>該当するワールドが見つかりません</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(w => `
    <div class="world-card">
      <div class="card-body">
        <div class="card-header">
          <div>
            <div class="card-title">${esc(w.title)}</div>
            <div class="card-title-en">${esc(w.title_en)}</div>
          </div>
          <span class="card-subject">${esc(w.subject)}</span>
        </div>
        <div class="card-description">${esc(w.description)}</div>
        <div class="card-meta">
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
            ${w.activities} アクティビティ（コーディング ${w.coding_activities}）
          </span>
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            ${esc(w.age_group)}
          </span>
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${esc(w.translated_date)}
          </span>
        </div>
        <div class="card-tags">
          ${w.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}
        </div>
        <div class="card-actions">
          <a href="${getDownloadUrl(w)}" class="download-btn" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            ダウンロード (.mcworld)
          </a>
          <a href="https://github.com/${esc(w.original_repo)}" class="source-link" target="_blank" rel="noopener">元のリポジトリ</a>
        </div>
      </div>
    </div>`).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- Report Form Logic ---
const categoryEl = document.getElementById("reportCategory");
const worldSelectGroup = document.getElementById("worldSelectGroup");
const worldInputGroup = document.getElementById("worldInputGroup");
const descriptionGroup = document.getElementById("descriptionGroup");
const expectedGroup = document.getElementById("expectedGroup");
const submitBtn = document.getElementById("reportSubmit");

categoryEl.addEventListener("change", () => {
  const cat = categoryEl.value;
  // Reset visibility
  worldSelectGroup.style.display = "none";
  worldInputGroup.style.display = "none";
  descriptionGroup.style.display = "none";
  expectedGroup.style.display = "none";
  submitBtn.style.display = "none";
  // Clear errors
  document.querySelectorAll(".form-group").forEach(g => g.classList.remove("has-error"));

  if (cat === "translation-bug") {
    worldSelectGroup.style.display = "block";
    descriptionGroup.style.display = "block";
    expectedGroup.style.display = "block";
    submitBtn.style.display = "inline-flex";
  } else if (cat === "world-request") {
    worldInputGroup.style.display = "block";
    descriptionGroup.style.display = "block";
    submitBtn.style.display = "inline-flex";
  } else if (cat === "other") {
    descriptionGroup.style.display = "block";
    submitBtn.style.display = "inline-flex";
  }
});

function populateWorldSelect() {
  const sel = document.getElementById("reportWorld");
  worlds.forEach(w => {
    const opt = document.createElement("option");
    opt.value = w.title;
    opt.textContent = `${w.title} (${w.title_en})`;
    sel.appendChild(opt);
  });
  const otherOpt = document.createElement("option");
  otherOpt.value = "__other__";
  otherOpt.textContent = "その他（直接入力）";
  sel.appendChild(otherOpt);
}

function submitReport() {
  const cat = categoryEl.value;
  let valid = true;

  // Clear errors
  document.querySelectorAll(".form-group").forEach(g => g.classList.remove("has-error"));

  // Validate category
  if (!cat) {
    categoryEl.closest(".form-group").classList.add("has-error");
    valid = false;
  }

  // Validate world (for translation-bug)
  if (cat === "translation-bug") {
    const world = document.getElementById("reportWorld").value;
    if (!world) {
      worldSelectGroup.classList.add("has-error");
      valid = false;
    }
  }

  // Validate world input (for world-request)
  if (cat === "world-request") {
    const worldInput = document.getElementById("reportWorldInput").value.trim();
    if (!worldInput) {
      worldInputGroup.classList.add("has-error");
      valid = false;
    }
  }

  // Validate description
  const desc = document.getElementById("reportDescription").value.trim();
  if (!desc) {
    descriptionGroup.classList.add("has-error");
    valid = false;
  }

  if (!valid) return;

  // Build GitHub Issue URL
  let title = "";
  let body = "";
  let labels = "";
  const expected = document.getElementById("reportExpected").value.trim();

  if (cat === "translation-bug") {
    const world = document.getElementById("reportWorld").value;
    title = `[誤訳] ${world}: ${desc.substring(0, 30)}`;
    labels = "bug,translation";
    body = `## カテゴリ\n誤訳・文字化け\n\n## 対象ワールド\n${world}\n\n## 問題の説明\n${desc}`;
    if (expected) body += `\n\n## 期待する修正\n${expected}`;
  } else if (cat === "world-request") {
    const worldInput = document.getElementById("reportWorldInput").value.trim();
    title = `[リクエスト] ${worldInput}`;
    labels = "enhancement";
    body = `## カテゴリ\nワールド追加リクエスト\n\n## 追加してほしいワールド\n${worldInput}\n\n## 理由・詳細\n${desc}`;
  } else if (cat === "other") {
    title = `[要望] ${desc.substring(0, 50)}`;
    labels = "feedback";
    body = `## カテゴリ\nその他の要望\n\n## 内容\n${desc}`;
  }

  body += `\n\n---\n*このIssueはフィードバックフォームから作成されました*`;

  const url = `https://github.com/${REPO}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=${encodeURIComponent(labels)}`;
  window.open(url, "_blank");
}

// Smooth scroll for header button
document.querySelector('.header-report-btn').addEventListener('click', function(e) {
  e.preventDefault();
  document.getElementById('report').scrollIntoView({ behavior: 'smooth' });
});

init().then(() => populateWorldSelect());
</script>
</body>
</html>
